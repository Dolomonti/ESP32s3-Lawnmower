; PlatformIO Project Configuration File
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.partitions = huge_app.csv

build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

monitor_speed = 115200
monitor_filters = send_on_enter, colorize

; DEAKTIVIERT - embed_preview.py hat die webpage.cpp überschrieben
; extra_scripts = pre:tools/embed_preview.py

lib_deps =
    madhephaestus/ESP32Servo @ ^1.2.1
    bblanchon/ArduinoJson @ ^6.21.0
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2
    arduino-libraries/NTPClient @ ^3.2.1

; ArduinoSTL ist nicht kompatibel mit ESP32 und verursacht Fehler
lib_ignore = ArduinoSTL